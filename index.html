<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSA Rift Calc</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #14110d; color: #e8e2d4;
    min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 20px; }
  .panel { width: 100%; max-width: 500px; background: #1d1913; border: 1px solid #3a3025;
    border-radius: 12px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,.5); }
  .header { display: flex; align-items: center; gap: 12px; padding: 16px 20px;
    background: #2a2113; border-bottom: 1px solid #4a3a1c; }
  .header svg { width: 26px; height: 26px; stroke: #f0a91e; flex-shrink: 0; }
  .header .title { font-size: 16px; font-weight: 600; color: #f0a91e; letter-spacing: .5px; }
  .header .sub { font-size: 12px; color: #b89048; margin-top: 2px; }
  .lang { margin-left: auto; display: flex; gap: 4px; flex-shrink: 0; }
  .lang button { background: transparent; border: 1px solid #4a3a1c; border-radius: 6px; color: #b89048;
    font-size: 11px; font-weight: 600; padding: 6px 8px; cursor: pointer; min-height: 32px;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .lang button.active { background: #f0a91e; color: #1d1913; border-color: #f0a91e; }
  .body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .section-title { font-size: 11px; color: #8a7e62; text-transform: uppercase; letter-spacing: 1px;
    margin-top: 4px; padding-bottom: 6px; border-bottom: 1px solid #2a2419; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: #b0a890; text-transform: uppercase; letter-spacing: .4px; }
  .field input { background: #14110d; border: 1px solid #3a3025; border-radius: 8px; color: #e8e2d4;
    font-family: 'Consolas', monospace; font-size: 16px; padding: 10px 12px; outline: none;
    transition: border-color .15s; width: 100%; min-height: 44px; min-width: 0; }
  .field input[type="datetime-local"] { -webkit-appearance: none; appearance: none; }
  .field input:focus { border-color: #f0a91e; box-shadow: 0 0 0 1px #f0a91e; }
  .hint { font-size: 11px; color: #6e6552; }
  .hint code { color: #b89048; background: #14110d; padding: 1px 5px; border-radius: 4px; }
  .inp { position: relative; display: flex; align-items: center; }
  .inp input { width: 100%; padding-right: 40px; }
  .inp .suffix { position: absolute; right: 13px; color: #b89048; font-family: 'Consolas',monospace;
    font-size: 14px; font-weight: 600; pointer-events: none; }
  .inp-btn { display: flex; gap: 8px; }
  .inp-btn input { flex: 1; min-width: 0; }
  .inp-btn button { background: #2a2113; border: 1px solid #4a3a1c; border-radius: 8px; color: #f0a91e;
    font-size: 20px; min-width: 48px; min-height: 44px; cursor: pointer; transition: background .15s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  .inp-btn button:hover { background: #3a2e15; }
  .inp-btn button:active { transform: scale(.94); }
  .rec { background: #14110d; border-left: 3px solid #f0a91e; border-radius: 0 8px 8px 0;
    padding: 10px 14px; font-size: 13px; color: #d4c8a8; }
  .rec strong { color: #f0a91e; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
  .opt { background: #14110d; border: 1px solid #2a2419; border-radius: 10px; padding: 14px;
    display: flex; flex-direction: column; gap: 6px; transition: border-color .2s, box-shadow .2s; }
  .opt.win { border-color: #f0a91e; box-shadow: 0 0 0 1px #f0a91e; }
  .opt .tag { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: #f0a91e; font-weight: 600; height: 12px; }
  .opt .name { font-size: 13px; font-weight: 600; color: #d4c8a8; }
  .opt .desc { font-size: 11px; color: #7a705a; line-height: 1.4; min-height: 30px; }
  .opt .row { font-size: 11px; color: #8a7e62; font-family: 'Consolas',monospace; }
  .opt .total { font-size: 22px; font-weight: 700; font-family: 'Consolas',monospace; color: #e8e2d4; margin-top: 4px; }
  .verdict { background: #f0a91e; border-radius: 10px; padding: 16px; display: flex; align-items: center; gap: 14px; }
  .verdict svg { width: 28px; height: 28px; stroke: #1d1913; flex-shrink: 0; }
  .verdict .lbl { font-size: 11px; color: #5a4410; text-transform: uppercase; letter-spacing: .8px; }
  .verdict .txt { font-size: 16px; font-weight: 700; color: #1d1913; margin-top: 2px; line-height: 1.3; }
  .verdict .rank { font-size: 12px; color: #5a4410; margin-top: 4px; font-family: 'Consolas',monospace; }
  .toggle { display: flex; align-items: center; gap: 12px; background: #14110d; border: 1px solid #3a3025;
    border-radius: 8px; padding: 14px; cursor: pointer; user-select: none; min-height: 48px;
    -webkit-tap-highlight-color: transparent; }
  .toggle input { width: 22px; height: 22px; accent-color: #f0a91e; cursor: pointer; flex-shrink: 0; }
  .toggle label { font-size: 13px; color: #d4c8a8; cursor: pointer; line-height: 1.3; }
  .toggle label .tsub { font-size: 11px; color: #7a705a; }
  .collapsible { display: flex; flex-direction: column; gap: 16px; }
  .hidden { display: none !important; }
  .premissas { background: #17140f; border: 1px dashed #4a3a1c; border-radius: 8px; padding: 12px 14px; }
  .premissas .ptit { font-size: 11px; color: #b89048; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
  .premissas ul { margin: 0; padding-left: 18px; }
  .premissas li { font-size: 12px; color: #a89a7e; line-height: 1.6; }
  .premissas li strong { color: #d4c8a8; }

  /* ===== MOBILE ===== */
  @media (max-width: 480px) {
    body { padding: 10px; }
    .body { padding: 14px; gap: 14px; }
    .header { padding: 14px; flex-wrap: wrap; }
    .grid2 { grid-template-columns: 1fr; gap: 14px; }
    .options { grid-template-columns: 1fr; }
    .opt .desc { min-height: 0; }
    .verdict { padding: 14px; gap: 10px; }
    .verdict .txt { font-size: 15px; }
  }
</style>
</head>

      noRankPrem2:'Como el rank-up cae <strong>después del reset ({htot}h desde ahora)</strong>, los slots nuevos no abren en este ciclo — por eso la comparación está oculta.',
      noRankPrem3:'La recomendación es usar el límite diario completo ({limite} minas) y seguir farmeando: es la ganancia máxima posible hoy.',
      row1:'farm después: {farm1}/h · {htot}h', row2:'pre: {pre}/h → post: {pos}/h',
      cmpPrem1:'<strong>Opción 1:</strong> asume que mejoras las {limite} minas <strong>ahora</strong> — el farm sube a {farm1}/h durante todo el ciclo ({htot}h), sin usar los slots del rank-up.',
      cmpPrem2:'<strong>Opción 2:</strong> asume {preUp} mina(s) mejorada(s) <strong>ahora</strong> (farm {farm2pre}/h) y, en el rank-up, +{slots} minas nuevas (el farm sube a {farm2pos}/h hasta el reset).',
      cmpPrem3:'El horario del rank-up ya <strong>descuenta la aceleración</strong> de las minas mejoradas ahora. Si no haces las mejoras, todo se retrasa.',
      cmpPrem4:'Los totales comparan el <strong>farm acumulado hasta el reset (12:00)</strong> — cristales de bestia o recaptura no entran; actualiza Recurso actual cuando los recibas.',
      tie:'Empate técnico — da igual.',
      winOpt1:'La Opción 1 gana por {diff} ({pct}%)', winOpt2:'La Opción 2 gana por {diff} ({pct}%)',
      almostTie:' — casi empate.',
      proj:'recurso proyectado: +{gain} ({min}min de farm)'
    }
  };

  var LANG='pt';
  function t(key, params){
    var s=(I18N[LANG]&&I18N[LANG][key])||I18N.pt[key]||key;
    if(params) for(var k in params) s=s.split('{'+k+'}').join(params[k]);
    return s;
  }
  function applyStatic(){
    var els=document.querySelectorAll('[data-i18n]');
    for(var i=0;i<els.length;i++) els[i].innerHTML=t(els[i].getAttribute('data-i18n'));
    document.documentElement.lang=I18N[LANG]._locale;
    document.title='MSA Rift Calc';
    g('langPt').classList.toggle('active',LANG==='pt');
    g('langEn').classList.toggle('active',LANG==='en');
    g('langEs').classList.toggle('active',LANG==='es');
  }
  function setLang(l){
    if(!I18N[l]) l='pt';
    LANG=l;
    try{ history.replaceState(null,'', location.pathname+'?lang='+l); }catch(e){}
    applyStatic();
    calc();
  }

  // ===================== HELPERS =====================
  function parseUnit(v, mult){
    if(v===null||v===undefined) return NaN;
    v=String(v).trim().replace(',','.').replace(/[^0-9.]/g,'');
    if(v==='') return NaN;
    var n=parseFloat(v);
    return isNaN(n)?NaN:n*mult;
  }
  function fmt(n){
    var loc=I18N[LANG]._locale;
    if(Math.abs(n)>=1e6) return (n/1e6).toLocaleString(loc,{maximumFractionDigits:2})+'M';
    if(Math.abs(n)>=1e3) return (n/1e3).toLocaleString(loc,{maximumFractionDigits:1})+'k';
    return Math.round(n).toLocaleString(loc);
  }
  function nowISO(){ var d=new Date(); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); return d.toISOString().slice(0,16); }
  function fmtData(tm){
    var hh=String(tm.getHours()).padStart(2,'0'), mm=String(tm.getMinutes()).padStart(2,'0');
    var d=String(tm.getDate()).padStart(2,'0'), mo=String(tm.getMonth()+1).padStart(2,'0');
    return I18N[LANG]._days[tm.getDay()]+' '+d+'/'+mo+' · '+hh+':'+mm;
  }
  function setVerdict(txt, rank){ g('verdict').textContent=txt; g('rankinfo').textContent=rank||''; }
  function setPremissas(items){
    if(!items||!items.length){ g('premissas').classList.add('hidden'); return; }
    g('premissas').classList.remove('hidden');
    g('premList').innerHTML=items.map(function(i){return '<li>'+i+'</li>';}).join('');
  }

  // ===================== CORE =====================
  function calc(){
    var atual=parseUnit(g('atual').value,1e6), meta=parseUnit(g('meta').value,1e6), farm=parseUnit(g('farm').value,1e3);
    var tAgora=new Date(g('agora').value);
    var temUpgrade=g('temUpgrade').checked;

    g('secUpgrade').classList.toggle('hidden', !temUpgrade);

    if([atual,meta,farm].some(isNaN) || isNaN(tAgora)){ setVerdict(t('errFill'),''); setPremissas(null); return; }
    if(atual>=meta){ setVerdict(t('errMet'),''); setPremissas(null); return; }
    if(farm<=0){ setVerdict(t('errFarmZero'),''); setPremissas(null); return; }

    // próximo reset 12:00
    var tReset=new Date(tAgora.getFullYear(),tAgora.getMonth(),tAgora.getDate(),12,0,0);
    if(tAgora>=tReset) tReset.setDate(tReset.getDate()+1);
    var Htot=(tReset-tAgora)/3600000;

    // ===== MODO SEM UPGRADE =====
    if(!temUpgrade){
      var hRank=(meta-atual)/farm;
      var tRank=new Date(tAgora.getTime()+hRank*3600000);
      var antesReset = hRank<=Htot;
      setPremissas([
        t('noUpPrem1',{farm:fmt(farm)}),
        t('noUpPrem2'),
        t('noUpPrem3')
      ]);
      setVerdict(t('noUpVerdict'), t('rankPrefix')+fmtData(tRank)+(antesReset?'':t('afterNextReset')));
      return;
    }

    // ===== MODO COM UPGRADE =====
    var fVelha=parseUnit(g('fVelha').value,1), fNova=parseUnit(g('fNova').value,1);
    var limite=parseInt(g('limite').value)||0, slots=parseInt(g('slots').value)||0;
    if([fVelha,fNova].some(isNaN)){ setVerdict(t('errFillMines'),''); return; }

    var delta=fNova-fVelha;
    var preUp=Math.max(0, limite - slots);
    var farm2pre=farm + delta*preUp;
    var horasRank=(meta-atual)/farm2pre;
    if(horasRank<0) horasRank=0;
    var tRank2=new Date(tAgora.getTime()+horasRank*3600000);
    var rankAntesDoReset = horasRank<=Htot;

    g('rec').innerHTML=t('rec',{preUp:preUp, limite:limite, slots:slots});

    if(!rankAntesDoReset){
      g('secOpcoes').classList.add('hidden');
      setPremissas([
        t('noRankPrem1',{preUp:preUp, farm2pre:fmt(farm2pre), farm:fmt(farm)}),
        t('noRankPrem2',{htot:Htot.toFixed(1)}),
        t('noRankPrem3',{limite:limite})
      ]);
      setVerdict(
        t('noRankVerdict'),
        t('rankPrefix')+fmtData(tRank2)+(preUp>0?t('countingMines',{preUp:preUp}):'')+t('afterResetSuffix')
      );
      return;
    }

    g('secOpcoes').classList.remove('hidden');

    var farm1=farm + delta*limite;
    var opt1=farm1*Htot;
    var farm2pos=farm2pre + fNova*slots;
    var HrankReset=Math.max(0, Htot - horasRank);
    var HpreRank=Htot - HrankReset;
    var opt2=farm2pre*HpreRank + farm2pos*HrankReset;

    g('row1').textContent=t('row1',{farm1:fmt(farm1), htot:Htot.toFixed(1)});
    g('tot1').textContent=fmt(opt1);
    g('row2').textContent=t('row2',{pre:fmt(farm2pre), pos:fmt(farm2pos)});
    g('tot2').textContent=fmt(opt2);

    var diff=opt2-opt1, pct=Math.abs(diff)/Math.max(opt1,opt2)*100;
    setPremissas([
      t('cmpPrem1',{limite:limite, farm1:fmt(farm1), htot:Htot.toFixed(1)}),
      t('cmpPrem2',{preUp:preUp, farm2pre:fmt(farm2pre), slots:slots, farm2pos:fmt(farm2pos)}),
      t('cmpPrem3'),
      t('cmpPrem4')
    ]);
    var box1=g('box1'), box2=g('box2');
    box1.classList.remove('win'); box2.classList.remove('win');
    g('tag1').textContent=''; g('tag2').textContent='';
    var rankStr=t('rankPrefix')+fmtData(tRank2)+(preUp>0?t('countingMines',{preUp:preUp}):'');
    if(Math.abs(diff)<1){ setVerdict(t('tie'), rankStr); }
    else if(diff>0){ box2.classList.add('win'); g('tag2').textContent=t('tagBest');
      setVerdict(t('winOpt2',{diff:fmt(diff), pct:pct.toFixed(1)})+(pct<1?t('almostTie'):'.'), rankStr); }
    else { box1.classList.add('win'); g('tag1').textContent=t('tagBest');
      setVerdict(t('winOpt1',{diff:fmt(-diff), pct:pct.toFixed(1)})+(pct<1?t('almostTie'):'.'), rankStr); }
  }

  // ===================== WIRE-UP =====================
  g('agora').value=nowISO();
  g('btnAgora').addEventListener('click',function(){
    var tAntes=new Date(g('agora').value);
    var tNovo=new Date();
    var farm=parseUnit(g('farm').value,1e3);
    var atual=parseUnit(g('atual').value,1e6);
    var horas=(tNovo-tAntes)/3600000;
    if(!isNaN(farm)&&!isNaN(atual)&&horas>0&&horas<48){
      var ganho=farm*horas;
      var novo=(atual+ganho)/1e6;
      g('atual').value=novo.toFixed(2);
      g('projInfo').textContent=t('proj',{gain:fmt(ganho), min:(horas*60).toFixed(0)});
      g('projInfo').classList.remove('hidden');
      clearTimeout(g('projInfo')._t);
      g('projInfo')._t=setTimeout(function(){ g('projInfo').classList.add('hidden'); },6000);
    }
    g('agora').value=nowISO();
    calc();
  });
  g('temUpgrade').addEventListener('change',calc);
  ['atual','meta','farm','fVelha','fNova','limite','slots','agora'].forEach(function(id){
    g(id).addEventListener('input',calc);
    g(id).addEventListener('change',calc);
  });
  g('langPt').addEventListener('click',function(){setLang('pt');});
  g('langEn').addEventListener('click',function(){setLang('en');});
  g('langEs').addEventListener('click',function(){setLang('es');});

  // idioma inicial: ?lang= na URL, senão pt
  var m=location.search.match(/[?&]lang=(pt|en|es)/);
  LANG=m?m[1]:'pt';
  applyStatic();
  calc();
})();
</script>
</body>
</html>
